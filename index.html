<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字保衛戰 - Word Defense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #111827;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        .word-item {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #f3f4f6;
            transition: color 0.2s;
        }
        .heart { color: #ef4444; }
        .key-btn { transition: all 0.1s; }
        .key-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="flex justify-between items-center p-4 bg-gray-800 border-b border-gray-700 text-white">
        <div id="stats" class="text-xl font-bold">分數: <span id="score" class="text-white">0</span></div>
        <div id="hearts" class="flex gap-1">
            <span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span>
        </div>
        <div class="text-xl font-bold">時間: <span id="timer" class="text-white">30</span>s</div>
    </header>

    <main id="game-zone" class="relative flex-grow overflow-hidden bg-gray-900"></main>

    <div id="keyboard" class="bg-gray-800 p-2 md:p-4 flex flex-col items-center gap-1 md:gap-2"></div>

    <div id="modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50 p-4">
        <div id="modal-content" class="bg-gray-800 p-8 rounded-2xl shadow-xl text-center w-full max-w-sm">
            <h2 id="modal-title" class="text-3xl font-bold mb-4">遊戲開始</h2>
            <div id="leaderboard" class="mb-4 text-left hidden"></div>
            <input type="text" id="player-name" placeholder="輸入名字" class="w-full p-2 rounded bg-gray-700 text-white mb-4 border border-gray-600 hidden">
            <button id="action-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full font-bold">開始遊戲</button>
        </div>
    </div>

    <script>
        const words = ["APPLE", "BANANA", "TIGER", "ORANGE", "SCHOOL", "PENCIL", "FRIEND", "GUITAR", "BEACH", "RABBIT"];
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWBlP9VHq2FROhYEWKCOVyOoSUlowu2lC55fhyPM6KibMH1GAaQl1rhRtSDIYOd12JFg/exec';
        let score = 0, health = 3, timeLeft = 30, gameActive = false, activeWord = null;
        let animationId;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const gameZone = document.getElementById('game-zone');
        const keyboard = document.getElementById('keyboard');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const heartsEl = document.getElementById('hearts');
        const modal = document.getElementById('modal');

        function playSound(freq, type = 'sine', duration = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const keyboardLayout = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
        keyboardLayout.forEach(rowStr => {
            const rowDiv = document.createElement('div');
            rowDiv.className = "flex gap-1 md:gap-2";
            rowStr.split('').forEach(char => {
                const btn = document.createElement('button');
                btn.textContent = char;
                btn.className = "key-btn bg-gray-700 text-white rounded p-2 md:p-3 font-bold hover:bg-gray-600 min-w-[32px] md:min-w-[40px]";
                btn.onclick = () => handleGuess(char, btn);
                rowDiv.appendChild(btn);
            });
            keyboard.appendChild(rowDiv);
        });

        function spawnWord() {
            if (!gameActive) return;
            const wordObj = words[Math.floor(Math.random() * words.length)];
            const hideIdx = Math.floor(Math.random() * wordObj.length);
            const display = wordObj.split('').map((char, i) => i === hideIdx ? '_' : char).join(' ');
            
            activeWord = {
                text: wordObj,
                hideIdx: hideIdx,
                y: 0,
                x: Math.random() * (window.innerWidth - 100) + 50,
                el: document.createElement('div')
            };

            activeWord.el.className = "word-item p-4 bg-gray-800 rounded shadow-lg";
            activeWord.el.textContent = display;
            gameZone.appendChild(activeWord.el);
        }

        function handleGuess(char, btn) {
            if (!gameActive || !activeWord) return;
            
            if (char === activeWord.text[activeWord.hideIdx]) {
                playSound(600, 'sine');
                score += 10;
                scoreEl.textContent = score;
                activeWord.el.classList.add('text-green-500');
                setTimeout(() => {
                    activeWord.el.remove();
                    activeWord = null;
                    spawnWord();
                }, 300);
            } else {
                playSound(200, 'square');
                btn.classList.add('bg-red-600');
                setTimeout(() => btn.classList.remove('bg-red-600'), 200);
            }
        }

        async function saveScore() {
            const name = document.getElementById('player-name').value.trim() || "匿名玩家";
            const btn = document.getElementById('action-btn');
            btn.disabled = true;
            btn.textContent = "上傳中...";

            try {
                // Post score to Google Sheet
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, score })
                });
                showLeaderboard();
            } catch (err) {
                console.error('雲端上傳失敗', err);
                showLeaderboard(); // 顯示本地資料
            }
        }

        async function showLeaderboard() {
            document.getElementById('player-name').classList.add('hidden');
            const lbDiv = document.getElementById('leaderboard');
            lbDiv.classList.remove('hidden');
            lbDiv.innerHTML = '<div class="text-center text-gray-400">讀取中...</div>';

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                // 排序並取前 10 名
                const top10 = data.sort((a, b) => b.score - a.score).slice(0, 10);
                
                let html = '<h3 class="font-bold text-center mb-2 text-yellow-400">🏆 全球排行榜 (Top 10)</h3>';
                html += '<div class="grid grid-cols-[30px_1fr_60px] gap-2 text-sm text-gray-200">';
                
                top10.forEach((entry, i) => {
                    const rankColor = i === 0 ? 'text-yellow-300' : 'text-gray-400';
                    html += `<div class="font-bold ${rankColor}">${i + 1}</div>
                             <div class="truncate">${entry.name}</div>
                             <div class="text-right font-mono font-bold">${entry.score}</div>`;
                });
                html += '</div>';
                lbDiv.innerHTML = html;
            } catch (e) {
                lbDiv.innerHTML = '<div class="text-center text-red-400">無法載入排行榜</div>';
            }
            
            const btn = document.getElementById('action-btn');
            btn.textContent = "再玩一次";
            btn.disabled = false;
            btn.onclick = () => window.location.reload();
        }

        function gameLoop() {
            if (!gameActive) return;
            if (activeWord) {
                activeWord.y += 1.5;
                activeWord.el.style.top = activeWord.y + 'px';
                activeWord.el.style.left = activeWord.x + 'px';
                if (activeWord.y > window.innerHeight - 200) {
                    activeWord.el.remove();
                    activeWord = null;
                    health--;
                    updateHearts();
                    if (health <= 0) endGame();
                    else spawnWord();
                }
            }
            animationId = requestAnimationFrame(gameLoop);
        }

        function updateHearts() { heartsEl.innerHTML = '❤'.repeat(health) + '🤍'.repeat(3 - health); }

        function endGame() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            modal.classList.remove('hidden');
            document.getElementById('modal-title').textContent = "遊戲結束";
            document.getElementById('player-name').classList.remove('hidden');
            const btn = document.getElementById('action-btn');
            btn.textContent = "送出分數";
            btn.onclick = saveScore;
        }

        function startGame() {
            score = 0; health = 3; timeLeft = 30;
            scoreEl.textContent = score;
            updateHearts();
            modal.classList.add('hidden');
            gameActive = true;
            spawnWord();
            gameLoop();
            const timer = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                if (timeLeft <= 0) { clearInterval(timer); endGame(); }
            }, 1000);
        }

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            const key = e.key.toUpperCase();
            const btn = Array.from(document.querySelectorAll('button')).find(b => b.textContent === key);
            if (btn) handleGuess(key, btn);
        });

        modal.classList.remove('hidden');
        document.getElementById('action-btn').onclick = startGame;
    </script>
</body>
</html>
